  why_learn_title: "為什麼要學習漢字筆畫順序？"
  why_learn_text: >
    學習正確的筆畫順序對於正確書寫漢字至關重要。遵循正確的筆畫順序有助於漢字識別，提高書寫的清晰度，
    並使記憶複雜漢字變得更容易。無論您是學習國語還是粵語，了解筆畫順序是掌握漢字書寫的基礎。
    我們的工具為每個漢字提供逐步指導，準確展示正確的書寫方式。
  how_it_works_title: "如何使用 Hanzi Guide"
  how_it_works_text: >
    只需在上方輸入框中輸入任何漢字或詞語，即可觀看逐筆動畫演示。您可以使用切換按鈕在簡體和繁體之間切換。
    使用播放控制來暫停、倒退或按自己的節奏逐步查看每一筆。對於互動練習，啟用"我想寫！"模式，
    可以親自練習書寫漢字並獲得實時反饋。非常適合學生、教師和任何學習讀寫漢字的人。
  duolingo_companion: "語言學習應用的完美配套工具"
  duolingo_companion_text: >
    正在使用 <a target="_blank" rel="noopener" href="https://www.duolingo.com">Duolingo</a>、Memrise
    或其他語言學習應用學習中文？Hanzi Guide 是幫助您掌握漢字書寫的完美輔助工具。語言學習應用教您詞彙和語法，
    而 Hanzi Guide 專注於正確的筆畫順序和書寫技巧。與您喜愛的語言學習應用配合使用，全面發展中文語言技能。
    本站與 Duolingo 或任何其他語言學習平台無關聯或背書。
