    explainer_title: "中文方言測驗與區域變體地圖"
    explainer_p1: "這個中文方言測驗會比較你的日常詞彙選擇、書寫形式、疑問語氣詞、親屬稱謂和讀音偏好，與中文的較大區域模式進行匹配。它面向國語、粵語、閩南語/福建話、吳語/上海話、西南官話、東北官話、台灣國語和中部過渡區等信號。"
    explainer_p2: "測驗不會直接問你來自哪裡，而是問哪些說法對你來說自然。結果是近似匹配，因為中文語言地理並不是清楚切開的硬邊界；相鄰地區常常共享特徵，現代使用者也可能混合國語、家鄉話、書面粵語、台灣用法、學習輸入和城市語言。"
    map_works_title: "地圖如何運作"
    map_works_p1: "地圖使用《漢語方言地圖集》的地點作為參考層。地圖集資料參考 Huang、Grieve、Jiao 和 Cai 2024 年關於中文方言地理的研究進行解釋，該研究按方言特徵相似度對地點分組。這種方法適合測驗結果，因為它能顯示較強區域、較弱邊緣和過渡區，而不是假裝每個答案都指向某一個精確城市。"
    map_works_p2: "結果應理解為「你的答案模式與這些區域輪廓相似」，而不是出身證明。它對傳統區域語言模式最強；對於混合背景者、學習者、主要使用標準國語的人，以及因遷移或教育改變日常語言的人，結果會更弱。"
    questions_title: "題目看什麼"
    questions_p: "有些題目測試詞彙，例如小孩、家、吃飯、下雨、冷熱天氣等說法。其他題目關注語法和書寫習慣，例如否定、疑問詞、粵語專用字、代詞、體貌標記和讀音線索。快速模式有 12 道寬泛問題，標準模式 18 道，深入模式 25 道以得到更細的比較。"
    sources_title: "來源與授權"
    source_paper: "方言地理與地圖集地點資料基於 Huang, He; Grieve, Jack; Jiao, Lei; Cai, Zhuo. 2024. “Geographic structure of Chinese dialects: a computational dialectometric approach.”"
