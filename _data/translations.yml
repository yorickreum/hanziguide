  about: "關於 Hanzi Guide"
  about_text: "Hanzi Guide 是一個免費的教育工具，基於 chanind 的 <a target=\"_blank\" href=\"https://github.com/chanind/hanzi-writer\">Hanzi Writer</a> 庫構建。這個互動應用程序通過動畫筆畫順序演示幫助學習者掌握漢字書寫，支持簡體字和繁體字。"
