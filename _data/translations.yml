    free_accessible_desc: "无需注册。支持任何有浏览器的设备。随时随地在电脑、平板或手机上练习。"
  about: "关于 Hanzi Guide"
  about_text: "Hanzi Guide 是一个免费的教育工具，基于 chanind 的 <a target=\"_blank\" href=\"https://github.com/chanind/hanzi-writer\">Hanzi Writer</a> 库构建。这个互动应用程序通过动画笔画顺序演示帮助学习者掌握汉字书写，支持简体字和繁体字。"
  data_source: "汉字笔画数据来自 <a target=\"_blank\" href=\"https://github.com/skishore/makemeahanzi\">Make Me a Hanzi</a> 项目。"
  why_learn_title: "为什么要学习汉字笔画顺序？"
  why_learn_text: >
    学习正确的笔画顺序对于正确书写汉字至关重要。遵循正确的笔画顺序有助于汉字识别，提高书写的清晰度，
    并使记忆复杂汉字变得更容易。无论您是学习国语还是粤语，了解笔画顺序是掌握汉字书写的基础。
    我们的工具为每个汉字提供逐步指导，准确展示正确的书写方式。
  how_it_works_title: "如何使用 Hanzi Guide"
  how_it_works_text: >
    只需在上方输入框中输入任何汉字或词语，即可观看逐笔动画演示。您可以使用切换按钮在简体和繁体之间切换。
    使用播放控制来暂停、倒退或按自己的节奏逐步查看每一笔。对于互动练习，启用"我想写！"模式，
    可以亲自练习书写汉字并获得实时反馈。非常适合学生、教师和任何学习读写汉字的人。
  duolingo_companion: "语言学习应用的完美配套工具"
  duolingo_companion_text: >
    正在使用 <a target="_blank" rel="noopener" href="https://www.duolingo.com">Duolingo</a>、Memrise
    或其他语言学习应用学习中文？Hanzi Guide 是帮助您掌握汉字书写的完美辅助工具。语言学习应用教您词汇和语法，
    而 Hanzi Guide 专注于正确的笔画顺序和书写技巧。与您喜爱的语言学习应用配合使用，全面发展中文语言技能。
    本站与 Duolingo 或任何其他语言学习平台无关联或背书。
