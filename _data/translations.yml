    next: "下一题"
    show_map: "显示地图"
    best_match: "最接近"
    map_aria: "OpenStreetMap 匹配概率地图"
    map_note: "阴影基于 Huang 等人 2024 年论文中的《汉语方言地图集》地点数据；圆点表示地图集地点，高亮圆环表示最接近的本地信号，颜色越深表示匹配越强。底图 © OpenStreetMap 贡献者。"
    map_reading: "如何读图"
    closest_signal: "最接近的本地信号"
    top_matches: "最接近的区域"
    closest_localities: "最接近的地图集地点"
    strongest_clues: "最强线索"
    feedback_title: "结果接近吗？"
    feedback_aria: "反馈选项"
    feedback_yes: "是"
    feedback_close: "差不多"
    feedback_no: "不是"
    actual_location_label: "它应该把你放在哪里？"
    actual_location_placeholder: "城市、地区或方言"
    send: "发送"
    feedback_status: "反馈会发送你的测验答案和结果，帮助我们改进模型。"
    review_answers: "查看答案"
    share_image: "分享结果图"
    copy_share: "复制分享文字"
    start_over: "重新开始"
    explainer_title: "中文方言测验与区域变体地图"
    explainer_p1: "这个中文方言测验会比较你的日常词汇选择、书写形式、疑问语气词、亲属称谓和读音偏好，与中文的较大区域模式进行匹配。它面向普通话、粤语、闽南语/福建话、吴语/上海话、西南官话、东北官话、台湾国语和中部过渡区等信号。"
    explainer_p2: "测验不会直接问你来自哪里，而是问哪些说法对你来说自然。结果是近似匹配，因为中文语言地理并不是清楚切开的硬边界；相邻地区常常共享特征，现代使用者也可能混合普通话、家乡话、书面粤语、台湾用法、学习输入和城市语言。"
    map_works_title: "地图如何工作"
    map_works_p1: "地图使用《汉语方言地图集》的地点作为参考层。地图集数据参考 Huang、Grieve、Jiao 和 Cai 2024 年关于中文方言地理的研究进行解释，该研究按方言特征相似度对地点分组。这种方法适合测验结果，因为它能显示较强区域、较弱边缘和过渡区，而不是假装每个答案都指向某一个精确城市。"
    map_works_p2: "结果应理解为“你的答案模式与这些区域画像相似”，而不是出身证明。它对传统区域语言模式最强；对于混合背景者、学习者、主要使用标准普通话的人，以及因迁移或教育改变日常语言的人，结果会更弱。"
    questions_title: "题目看什么"
    questions_p: "有些题目测试词汇，例如小孩、家、吃饭、下雨、冷热天气等说法。其他题目关注语法和书写习惯，例如否定、疑问词、粤语专用字、代词、体貌标记和读音线索。快速模式有 12 道宽泛问题，标准模式 18 道，深入模式 25 道以得到更细的比较。"
    sources_title: "来源与许可证"
    source_paper: "方言地理与地图集地点数据基于 Huang, He; Grieve, Jack; Jiao, Lei; Cai, Zhuo. 2024. “Geographic structure of Chinese dialects: a computational dialectometric approach.”"
    source_dataset: "来自《汉语方言地图集》的点位数据来自 Zenodo 上的补充数据集："
    source_dataset_license: "采用 Creative Commons Attribution 4.0 International 许可。本站使用由 cn_tax.csv 生成的本地精简 JSON。"
    source_osm: "底图数据和瓦片 © OpenStreetMap 贡献者，并按 Open Data Commons Open Database License 提供。"
    source_leaflet: "交互式地图使用 Leaflet 1.9.4，采用 BSD 2-Clause License。"
    source_note: "测验题目、评分权重、区域标签和图标呈现是 Hanzi Guide 的派生实现。它不是《汉语方言地图集》的官方产品，也未获得作者、Zenodo、OpenStreetMap 或 Leaflet 背书。"


