  components_label: "Components:"
  home_teasers:
    idiom_title: "Idiom of the Day"
    idiom_loading: "Loading today's idiom..."
    idiom_fallback: "Open today's idiom with meaning and stroke practice."
    idiom_practice: "Practice it"
    idiom_more: "More idioms"
    geo_title: "Curious where your Chinese sounds like it is from?"
    geo_text: "Try the Chinese variety map quiz for Mandarin, Cantonese, Min, Wu, and other regional patterns."
    geo_button: "Take the quiz"
  geo_quiz:
    title: "Chinese Dialect Quiz and Variety Map"
    description: "Take a Chinese dialect quiz that compares your vocabulary, characters, grammar, and pronunciation with Mandarin, Cantonese, Min, Wu, and other regional Chinese varieties."
    kicker: "Chinese Variety Map"
    h1: "Where is your Chinese from?"
    lede: "Answer a few questions about the words, characters, and pronunciations that feel natural to you. Hanzi Guide will compare your answers with broad regional Chinese speech patterns."
    privacy: "Your current quiz is remembered only for this browser session."
    research_note: "The map is designed as an approximate match, inspired by research showing that Chinese dialect regions have cores, margins, and transition zones rather than only hard borders."
    questions_label: "Questions"
    fast: "Fast · 12"
    standard: "Standard · 18"
    deep: "Deep · 25"
    progress_initial: "Question 1"
    reset: "Reset"
    back: "Back"
    next: "Next"
    show_map: "Show Map"
    best_match: "Best Match"
    map_aria: "OpenStreetMap likelihood map"
    map_note: "Shading is built from Linguistic Atlas of Chinese Dialects localities from Huang et al. 2024; dots show the underlying atlas places, highlighted rings mark the closest local signals, and stronger matches appear darker. Base map © OpenStreetMap contributors."
    map_reading: "Map Reading"
    closest_signal: "Closest Local Signal"
    top_matches: "Top Matches"
    closest_localities: "Closest Atlas Localities"
    strongest_clues: "Strongest Clues"
    feedback_title: "Were we close?"
    feedback_aria: "Feedback options"
    feedback_yes: "Yes"
    feedback_close: "Close"
    feedback_no: "No"
    actual_location_label: "Where should it have placed you?"
    actual_location_placeholder: "City, region, or variety"
    send: "Send"
    feedback_status: "Feedback sends your quiz answers and result to us so we can improve the model."
    review_answers: "Review Answers"
    share_image: "Share Result Card"
    copy_share: "Copy Share Text"
    start_over: "Start Over"
    explainer_title: "Chinese Dialect Quiz and Regional Variety Map"
    explainer_p1: "This Chinese dialect quiz compares your everyday word choices, written forms, question particles, kinship terms, and pronunciation preferences with broad regional patterns in Chinese. It is designed for Mandarin, Cantonese/Yue, Min/Hokkien, Wu/Shanghainese, Southwestern Mandarin, Northeastern Mandarin, Taiwan Mandarin, and central transition-zone signals."
    explainer_p2: "Instead of asking where you are from, the quiz asks which forms feel natural to you. The result is shown as an approximate match, because Chinese language geography does not split neatly into hard borders. Neighboring regions often share features, and modern speakers may mix standard Mandarin, home dialects, written Cantonese, Taiwanese usage, learner input, and urban speech."
    map_works_title: "How the map works"
    map_works_p1: "The map uses localities from the Linguistic Atlas of Chinese Dialects as a reference layer. The atlas data is interpreted through the dialect geography work of Huang, Grieve, Jiao, and Cai, whose 2024 paper groups atlas locations by how similar their recorded dialect features are. That approach is a useful fit for a quiz result because it highlights stronger regions, weaker margins, and transition zones rather than pretending every answer points to one exact city."
    map_works_p2: "Your result should be read as “your answer pattern is similar to these regional profiles,” not as proof of origin. It is strongest for traditional regional speech patterns and weaker for mixed-background users, learners, people who mostly use Standard Mandarin, and speakers whose everyday language has changed through migration or schooling."
    questions_title: "What the questions look for"
    questions_p: "Some questions test vocabulary, such as words for a child, home, eating, rain, or hot and cold weather. Others look at grammar and written usage, such as negation, question words, Cantonese-specific characters, pronouns, aspect markers, and pronunciation clues. Fast mode asks 12 broad questions, Standard asks 18, and Deep asks 25 for a more detailed comparison."
    sources_title: "Sources and Licenses"
    source_paper: "Dialect geography and atlas-point data are based on Huang, He; Grieve, Jack; Jiao, Lei; Cai, Zhuo. 2024. “Geographic structure of Chinese dialects: a computational dialectometric approach.”"
    source_dataset: "Linguistic Atlas of Chinese Dialects-derived point data comes from the supplementary dataset on Zenodo:"
    source_dataset_license: "licensed under Creative Commons Attribution 4.0 International. We use a reduced local JSON extract generated from cn_tax.csv."
    source_osm: "Base map data and tiles are © OpenStreetMap contributors and available under the Open Data Commons Open Database License."
    source_leaflet: "The interactive map uses Leaflet 1.9.4, licensed under the BSD 2-Clause License."
    source_note: "Quiz questions, scoring weights, region labels, and icon presentation are Hanzi Guide’s derived implementation. They are not an official Linguistic Atlas of Chinese Dialects product and are not endorsed by the authors, Zenodo, OpenStreetMap, or Leaflet."

